name: MathUtils Automated CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Chạy Test và Build bằng Maven
        run: mvn -B verify
      - name: Luu tru file JAR
        uses: actions/upload-artifact@v4
        with:
          name: MathProject-Jar
          path: target/*.jar